<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Modern Weather App | Shalinda</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="search">
                <input type="text" placeholder="Enter city name" spellcheck="false">
                <button title="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            
            <div class="weather">
                <i class="fa-solid fa-cloud weather-icon main-icon"></i>
                <h1 class="temp">--°C</h1>
                <h2 class="city">City Name</h2>
                
                <div class="details">
                    <div class="col">
                        <i class="fa-solid fa-droplet icon-detail"></i>
                        <div>
                            <p class="humidity">--%</p>
                            <p class="label">Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <i class="fa-solid fa-wind icon-detail"></i>
                        <div>
                            <p class="wind">-- km/h</p>
                            <p class="label">Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
